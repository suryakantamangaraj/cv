name: Build and Serve

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare Assets for Serve Branch
        run: |
          cp README.md dist/ 2>/dev/null || echo "No README found"
          cp LICENSE dist/ 2>/dev/null || echo "No LICENSE found"
          touch dist/.nojekyll

      - name: Deploy to Main (Serve Branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          cname: cv.suryaraj.com
          # force_orphan: true # Uncomment if you want to clear history on main every time
