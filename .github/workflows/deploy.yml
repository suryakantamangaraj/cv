name: Build and Serve

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare Assets for Serve Branch
        run: |
          cp CNAME dist/client/ 2>/dev/null || echo "No CNAME found"
          cp README.md dist/client/ 2>/dev/null || echo "No README found"
          cp LICENSE dist/client/ 2>/dev/null || echo "No LICENSE found"
          touch dist/client/.nojekyll

      - name: Deploy to Main (Serve Branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          publish_branch: main
          force_push: true
